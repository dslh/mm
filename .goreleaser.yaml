version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: mm
    binary: mm
    main: ./cmd/mm
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.ShortCommit}}
      - -X main.Date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    # Windows users expect zip; Scoop downloads these.
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: dslh
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/dslh/mm"
    description: "CLI + MCP server for the mon-marché.fr grocery (cart only)"
    license: "MIT"
    install: |
      bin.install "mm"
    test: |
      system "#{bin}/mm", "version"

scoops:
  - repository:
      owner: dslh
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    homepage: "https://github.com/dslh/mm"
    description: "CLI + MCP server for the mon-marché.fr grocery (cart only)"
    license: "MIT"
